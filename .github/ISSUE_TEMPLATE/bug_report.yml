name: Bug report
description: Report reproducible behavior that is not working as intended
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Reviewonator. Do not include tokens, private repository content, or security vulnerabilities here.
  - type: input
    id: version
    attributes:
      label: Reviewonator version
      description: Release version or commit SHA.
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS ARM64
        - macOS x64
        - Linux ARM64
        - Linux x64
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe example that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove repository secrets, tokens, private source code, and personal information first.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This report does not disclose a security vulnerability.
          required: true
