name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(bun -p 'require("./package.json").version')
          test "$GITHUB_REF_NAME" = "v$PACKAGE_VERSION"
      - name: Check project
        run: bun run check

  package:
    name: Package ${{ matrix.platform }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            target: bun-darwin-arm64
          - platform: darwin-x64
            target: bun-darwin-x64
          - platform: linux-arm64
            target: bun-linux-arm64
          - platform: linux-x64
            target: bun-linux-x64-baseline
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build web application
        run: bun run build:web
      - name: Cross-compile executable
        run: bun build --compile --minify --target=${{ matrix.target }} src/cli.ts --outfile dist/reviewonator-${{ matrix.platform }}
      - name: Package release archive
        run: ./scripts/package-release.sh "${{ matrix.platform }}" "dist/reviewonator-${{ matrix.platform }}" release
      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: reviewonator-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
