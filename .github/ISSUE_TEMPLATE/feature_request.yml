name: Feature request
description: Suggest an improvement to Reviewonator
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What review workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful solution and its user experience.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches or workarounds did you consider?
  - type: checkboxes
    id: safety
    attributes:
      label: Publishing safety
      options:
        - label: The proposal preserves explicit preview and confirmation before publishing a review.
          required: true
